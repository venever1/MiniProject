<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Kanban Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Header -->
  <header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold text-gray-800 tracking-tight">Mini Kanban Board</h1>
    <button
      id="btn-add-task"
      class="bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700 active:bg-blue-800 transition-colors cursor-pointer"
    >
      + Tambah Tugas
    </button>
  </header>

  <!-- Board -->
  <main id="board" class="grid grid-cols-1 md:grid-cols-3 gap-4 p-6">

    <!-- Kolom To Do -->
    <div id="col-todo" class="bg-gray-100 rounded-lg p-4 min-h-48 border border-gray-200">
      <div class="column-header flex items-center justify-between mb-4">
        <h2 class="font-semibold text-gray-700">To Do</h2>
        <span class="badge bg-gray-300 text-gray-700 text-xs font-bold px-2 py-1 rounded-full">0</span>
      </div>
      <div class="cards-container flex flex-col">
        <!-- Kartu dirender oleh JavaScript -->
      </div>
    </div>

    <!-- Kolom In Progress -->
    <div id="col-in-progress" class="bg-yellow-100 rounded-lg p-4 min-h-48 border border-yellow-200">
      <div class="column-header flex items-center justify-between mb-4">
        <h2 class="font-semibold text-yellow-800">In Progress</h2>
        <span class="badge bg-yellow-300 text-yellow-800 text-xs font-bold px-2 py-1 rounded-full">0</span>
      </div>
      <div class="cards-container flex flex-col">
        <!-- Kartu dirender oleh JavaScript -->
      </div>
    </div>

    <!-- Kolom Done -->
    <div id="col-done" class="bg-green-100 rounded-lg p-4 min-h-48 border border-green-200">
      <div class="column-header flex items-center justify-between mb-4">
        <h2 class="font-semibold text-green-800">Done</h2>
        <span class="badge bg-green-300 text-green-800 text-xs font-bold px-2 py-1 rounded-full">0</span>
      </div>
      <div class="cards-container flex flex-col">
        <!-- Kartu dirender oleh JavaScript -->
      </div>
    </div>

  </main>

  <!-- Modal Tambah Tugas -->
  <div
    id="modal"
    class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"
  >
    <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md mx-4">
      <h2 class="text-lg font-bold text-gray-800 mb-4">Tambah Tugas Baru</h2>

      <input
        id="task-input"
        type="text"
        placeholder="Judul tugas..."
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 mb-2"
      />

      <p id="error-msg" class="hidden text-red-500 text-sm mb-3">
        Judul tugas tidak boleh kosong.
      </p>

      <div class="flex justify-end gap-2 mt-4">
        <button
          id="btn-cancel"
          class="px-4 py-2 text-sm rounded border border-gray-300 text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer"
        >
          Batal
        </button>
        <button
          id="btn-save"
          class="px-4 py-2 text-sm rounded bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800 transition-colors cursor-pointer"
        >
          Simpan
        </button>
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
